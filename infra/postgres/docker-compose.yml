version: "3.8"
services:
  nexus-postgres:
    image: postgres:16.3-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: Postgres2024!
      POSTGRES_USER: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - postgres-network

  nexus-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexus-pgadmin
    restart: always
    depends_on:
      - nexus-postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: infra@nexus.com.br
      PGADMIN_DEFAULT_PASSWORD: PgAdmin2024!
    ports:
      - 16543:80
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - postgres-network

networks:
  postgres-network:
    driver: bridge

volumes:
  postgres-data:
  pgadmin-data: